  #stats {

  .stat-card {

function makeIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
    <circle cx="11" cy="11" r="9" fill="${color}" stroke="white" stroke-width="2.5" opacity="0.92"/>
  </svg>`;
  return L.divIcon({
    html: svg, className: '', iconSize: [22,22], iconAnchor: [11,11], popupAnchor: [0,-12]
  });
}

const counts = {1:0, 2:0, 3:0};

empresas.forEach(e => {
  counts[e.zona]++;
  const color = ZONA_COLORS[e.zona];
  const marker = L.marker([e.lat, e.lng], { icon: makeIcon(color) });
  marker.bindPopup(`
    <div style="font-family:'Segoe UI',Arial,sans-serif;min-width:200px">
      <div style="font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:6px">${e.empresa}</div>
      <div style="font-size:12px;color:#555;margin-bottom:8px">📍 ${e.ubicacion}</div>
      <div style="display:inline-block;background:${color};color:white;border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600">
        ${ZONA_NAMES[e.zona]}
      </div>
    </div>
  `, { maxWidth: 260 });
  marker.addTo(map);
});

legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>Zonas Comerciales</h4>
    ${[1,2,3].map(z => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${ZONA_COLORS[z]}"></div>
        <div class="legend-text"><b>${ZONA_NAMES[z]}</b><br><span style="font-size:10px;color:#777">${
          z===1 ? 'Sinaloa, Sonora, BC, BCS' : z===2 ? 'Chih., Coah., Dgo., Zac., Jal., Mich., Nay.' : 'Resto del país'
        }</span></div>
        <span class="legend-count">${counts[z]}</span>
      </div>`).join('')}
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid #eee;font-size:11px;color:#888">
      Total: <b>${empresas.length}</b> distribuidoras
    </div>
  `;
  return div;
};
legend.addTo(map);
